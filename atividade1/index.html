<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade</title>
    <script src="script.js"></script>
</head>
<body>
    <section class="1">
        <h2>1. Computador de Bordo</h2>
        <fieldset>
            <legend>Painel</legend>
            <label>Informe quantos R$ dispõe:</label>
            <input type="number" id="dinheiro" step="0.01" placeholder="999.99">
            <button onclick="calcular()">Calcular</button>
            <p id="resultado"></p>
        </fieldset>
    </section>
    <section class="2">
        <h2>2. Calculadora de IMC</h2>
        <fieldset>
            <legend>Calculadora de IMC</legend>
            <label>Informe o peso (KG)</label>
            <input type="number" id="peso" step="0.01" placeholder="999.99">
            <label>Informe a altura (m)</label>
            <input type="number" id="altura" step="0.01" placeholder="9.99">
            <button onclick="calcularIMC()">Calcular</button>
            <p id="resultadoIMC"></p>
        </fieldset>
    </section>
    <section class="3">
        <h2>3. Cálculo de Probabilidades</h2>
        <fieldset>
            <legend>Simulador</legend>
            <button onclick="simular()">Simular</button>
            <p>Resposta:</p>
            <table border="1">
                <tr>
                    <th>Face</th>
                    <th>Ocorrências</th>
                    <th>Frequência</th>
                </tr>
                <tr><td>1</td><td id="o1"></td><td id="f1"></td></tr>
                <tr><td>2</td><td id="o2"></td><td id="f2"></td></tr>
                <tr><td>3</td><td id="o3"></td><td id="f3"></td></tr>
                <tr><td>4</td><td id="o4"></td><td id="f4"></td></tr>
                <tr><td>5</td><td id="o5"></td><td id="f5"></td></tr>
                <tr><td>6</td><td id="o6"></td><td id="f6"></td></tr>
            </table>
        </fieldset>
    </section>
    <section class="4">
        <h2>4. Inversor de Nomes</h2>
        <fieldset>
            <legend>Nomes</legend>
            <label>Insira um nome</label>
            <input type="text" id="nome" placeholder="Digite um nome">
            <button onclick="adicionar()">Adicionar nome</button>
            <p><b>Lista de Nomes Digitados</b></p>
            <ul id="lista"></ul>
            <button onclick="inverter()">Inverter</button>
            <p><b>Lista de Nomes Invertidos</b></p>
            <ul id="invertidos"></ul>
        </fieldset>
    </section>
    <section class="5">
        <h2>5. Palíndromo</h2>
        <fieldset>
            <legend>Palindromista</legend>
            <label>Digite uma palavra</label>
            <input type="text" id="palavra" placeholder="Digite uma palavra">
            <button onclick="testar()">Testa Palíndromo</button>
            <p id="resultadoPal"></p>
        </fieldset>
    </section>
</body>
</html>
